version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: footstats-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: footstats-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: footstats
      MYSQL_USER: footuser
      MYSQL_PASSWORD: footpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./initBBDD.sql:/docker-entrypoint-initdb.d/initBBDD.sql:ro

volumes:
  db_data:
